name: Playwright Tests
on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        version: 10.16.1

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24
        cache: 'pnpm'

    - name: Install root dependencies
      run: pnpm install --frozen-lockfile

    - name: Build SDK
      run: pnpm build

    - name: Build auth-sample for production
      env:
        NEXT_PUBLIC_OPENFORT_PUBLIC_KEY: ${{ vars.NEXT_PUBLIC_OPENFORT_PUBLIC_KEY }}
        NEXT_PUBLIC_SHIELD_API_KEY: ${{ vars.NEXT_PUBLIC_SHIELD_API_KEY }}
        NEXT_PUBLIC_POLICY_ID: ${{ vars.NEXT_PUBLIC_POLICY_ID }}
        NEXT_PUBLIC_CHAIN_ID: ${{ vars.NEXT_PUBLIC_CHAIN_ID }}
        NEXT_PUBLIC_CONTRACT_ID: ${{ vars.NEXT_PUBLIC_CONTRACT_ID }}
        NEXT_PUBLIC_REOWN_PROJECT_ID: ${{ vars.NEXT_PUBLIC_REOWN_PROJECT_ID }}
        NEXT_PUBLIC_COINBASE_PROJECTID: ${{ vars.NEXT_PUBLIC_COINBASE_PROJECTID }}
        NEXT_PUBLIC_MOONPAY_API_KEY: ${{ vars.NEXT_PUBLIC_MOONPAY_API_KEY }}
      run: pnpm build
      working-directory: examples/apps/auth-sample

    - name: Install Playwright Browsers
      # Splits `--with-deps` into two operations so a hang in the system-deps
      # install (apt-get on the GitHub-hosted runner) fails fast at the
      # step-level timeout instead of eating the 60-min job-level wall.
      #
      # Setting DEBIAN_FRONTEND / NEEDRESTART_* on the apt-get sudo command
      # line (rather than just the GitHub `env:` block) is required because
      # the runner's sudoers does not preserve NEEDRESTART_* — without this,
      # the post-apt needrestart hook on Ubuntu 24.04 runners can wait on a
      # TTY prompt that is never answered and the step blocks indefinitely.
      env:
        DEBIAN_FRONTEND: noninteractive
        NEEDRESTART_MODE: a
        NEEDRESTART_SUSPEND: '1'
      run: |
        sudo -E NEEDRESTART_MODE=a NEEDRESTART_SUSPEND=1 DEBIAN_FRONTEND=noninteractive \
          pnpm exec playwright install-deps
        pnpm playwright install
      working-directory: examples/apps/auth-sample
      timeout-minutes: 10

    - name: Run Playwright tests
      env:
        NEXTAUTH_OPENFORT_SECRET_KEY: ${{ secrets.NEXTAUTH_OPENFORT_SECRET_KEY }}
        NEXTAUTH_SHIELD_ENCRYPTION_SHARE: ${{ secrets.NEXTAUTH_SHIELD_ENCRYPTION_SHARE }}
        NEXTAUTH_SHIELD_SECRET_KEY: ${{ secrets.NEXTAUTH_SHIELD_SECRET_KEY }}
        E2E_TESTS_PASSWORD: ${{ secrets.E2E_TESTS_PASSWORD }}
        NEXT_PUBLIC_OPENFORT_PUBLIC_KEY: ${{ vars.NEXT_PUBLIC_OPENFORT_PUBLIC_KEY }}
        NEXT_PUBLIC_SHIELD_API_KEY: ${{ vars.NEXT_PUBLIC_SHIELD_API_KEY }}
        NEXT_PUBLIC_POLICY_ID: ${{ vars.NEXT_PUBLIC_POLICY_ID }}
        NEXT_PUBLIC_CHAIN_ID: ${{ vars.NEXT_PUBLIC_CHAIN_ID }}
        NEXT_PUBLIC_CONTRACT_ID: ${{ vars.NEXT_PUBLIC_CONTRACT_ID }}
        NEXT_PUBLIC_REOWN_PROJECT_ID: ${{ vars.NEXT_PUBLIC_REOWN_PROJECT_ID }}
        NEXT_PUBLIC_COINBASE_PROJECTID: ${{ vars.NEXT_PUBLIC_COINBASE_PROJECTID }}
        NEXT_PUBLIC_MOONPAY_API_KEY: ${{ vars.NEXT_PUBLIC_MOONPAY_API_KEY }}
        E2E_TESTS_USER: ${{ vars.E2E_TESTS_USER }}
      run: pnpm playwright test --reporter=dot --workers=5
      working-directory: examples/apps/auth-sample

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: examples/apps/auth-sample/playwright-report/
        retention-days: 30