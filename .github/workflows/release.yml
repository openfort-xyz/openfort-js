name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Create version pull request and github release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write       # To push commits and tags
      pull-requests: write  # To create and update PRs
      id-token: write       # For OIDC and provenance
      # packages: write       # To publish package to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.16.1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm changeset:publish
          version: pnpm changeset:version
          commit: "chore: version package" # Default is `Version Packages`
          title: "chore: version package"  # Default is `Version Packages`
        env:
          NPM_CONFIG_PROVENANCE: true # this works only with npmjs and public repos, not ghcr
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}    # we need this for PRs
          NPM_TOKEN: '' # bug in changesets/action - https://github.com/changesets/changesets/issues/1152#issuecomment-3190884868

