version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 0
    commit-message:
      prefix: "chore(sec)"
    labels:
      - "dependencies"
      - "security"
